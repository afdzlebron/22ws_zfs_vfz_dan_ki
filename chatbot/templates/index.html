<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
    <!-- <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css.css')}}" /> -->
    <meta charset="utf-8" />
</head>

<body>
    <div class="row">
        <div class="col-md-10 mr-auto ml-auto">
    <h1>ChatBot</h1>
    <h2>Gruppe: Alwin, Andres, Donya, Luisa</h2>
    <form>
        <div id="chatbox">
            <div class="col-md-8 ml-auto mr-auto">
                <p class="botText"><span>Hi!</span></p>
            </div>
        </div>
        <div id="userInput" class="row">
            <div class="col-md-10">
                <input id="text" type="text" name="msg" placeholder="Nachricht hier eingeben" class="form-control">
                <button type="submit" id="send" class="btn btn-warning">Absenden</button>
            </div>
        </div>
    </form>
</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var form = document.querySelector("form");
        var textInput = document.getElementById("text");
        var chatbox = document.getElementById("chatbox");

        function appendMessage(cls, text) {
            var p = document.createElement("p");
            p.className = cls;
            var span = document.createElement("span");
            span.textContent = text;
            p.appendChild(span);
            chatbox.appendChild(p);
        }

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            var rawText = textInput.value.trim();
            if (!rawText) {
                return;
            }
            appendMessage("userText", rawText);
            textInput.value = "";
            document.getElementById("userInput").scrollIntoView({
                block: "start",
                behavior: "smooth",
            });

            try {
                var response = await fetch("/get", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                    },
                    body: new URLSearchParams({ msg: rawText }),
                });
                var data = await response.text();
                appendMessage("botText", data || "Keine Antwort vom Server.");
            } catch (err) {
                appendMessage("botText", "Serverfehler. Bitte später erneut versuchen.");
            }

            document.getElementById("userInput").scrollIntoView({
                block: "start",
                behavior: "smooth",
            });
        });
    });
</script>
</body>

</html>
