<!DOCTYPE html>
<html lang="de">

<head>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
    <!-- <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css.css')}}" /> -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatBot</title>
</head>

<body data-endpoint="{{ url_for('chatbot_response') }}">
    <main class="page">
        <header class="hero">
            <div class="hero__text">
                <p class="eyebrow">KI-gestützter Kundenservice</p>
                <h1>ChatBot</h1>
                <p class="lead">
                    Stelle konkrete Fragen zu Produkten, Lieferung oder Rückgabe. Der Bot antwortet in wenigen Sekunden.
                </p>
            </div>
            <div class="hero__card">
                <p class="hero__label">Gruppe</p>
                <p class="hero__names">Alwin, Andres, Donya, Luisa</p>
            </div>
        </header>

        <section class="chat-panel">
            <div id="chatbox" class="chatbox" role="log" aria-live="polite" aria-relevant="additions">
                <div class="message bot">
                    <span>Hi! Wie kann ich helfen?</span>
                </div>
            </div>
            <form id="chat-form" class="chat-form" autocomplete="off">
                <input id="text" type="text" name="msg" placeholder="Nachricht hier eingeben"
                    class="form-control" maxlength="500" aria-label="Nachricht eingeben" required>
                <button type="submit" id="send" class="btn btn-warning">Senden</button>
            </form>
            <p class="hint">Tipp: Kurze, klare Fragen führen zu besseren Antworten.</p>
        </section>
    </main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var form = document.getElementById("chat-form");
        var textInput = document.getElementById("text");
        var chatbox = document.getElementById("chatbox");
        var endpoint = document.body.dataset.endpoint || "/get";
        var pending = false;

        function appendMessage(kind, text) {
            var wrapper = document.createElement("div");
            wrapper.className = "message " + kind;
            var span = document.createElement("span");
            span.textContent = text;
            wrapper.appendChild(span);
            chatbox.appendChild(wrapper);
            chatbox.scrollTop = chatbox.scrollHeight;
            return wrapper;
        }

        function setPending(state) {
            pending = state;
            textInput.disabled = state;
            document.getElementById("send").disabled = state;
            if (!state) {
                textInput.focus();
            }
        }

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            var rawText = textInput.value.trim();
            if (!rawText || pending) {
                return;
            }
            appendMessage("user", rawText);
            textInput.value = "";
            var typingIndicator = appendMessage("bot typing", "Schreibt ...");
            setPending(true);

            try {
                var response = await fetch(endpoint, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                    },
                    body: new URLSearchParams({ msg: rawText }),
                });
                if (!response.ok) {
                    typingIndicator.remove();
                    appendMessage("bot error", "HTTP-Fehler " + response.status + " beim Antworten.");
                    return;
                }
                var data = await response.text();
                typingIndicator.remove();
                appendMessage("bot", data || "Keine Antwort vom Server.");
            } catch (err) {
                typingIndicator.remove();
                appendMessage("bot error", "Serverfehler. Bitte später erneut versuchen.");
            } finally {
                setPending(false);
            }
        });
    });
</script>
</body>

</html>
