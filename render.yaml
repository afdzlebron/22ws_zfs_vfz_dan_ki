services:
  - type: web
    name: chatbot
    env: python
    plan: free
    buildCommand: >-
      python -m pip install --upgrade pip setuptools wheel &&
      pip install --upgrade --force-reinstall -r requirements.txt &&
      python -m nltk.downloader punkt stopwords -d chatbot/nltk_data
    startCommand: gunicorn chatbot.wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
